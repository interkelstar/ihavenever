spring.config.activate.on-profile: "mysql"
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_URL:localhost}:${DB_PORT:3306}/${DB_NAME:ihne}?useUnicode=yes&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASS:pw}
    hikari:
      allow-pool-suspension: true
      connection-test-query: SELECT 1
      connection-timeout: 60000 #1 min
      validation-timeout: 1000 #1 sec
      idle-timeout: 300000 #5 mins
      minimum-idle: 2
      maximum-pool-size: 5
      max-lifetime: 600000 #10 mins
  # This profile appears to be dead: a legacy Heroku/docker-compose deployment path
  # (docker-compose.yml last touched 2022, alongside heroku.yml/Procfile) that predates the
  # current Cloud Run + CRaC + Supabase/Postgres deployment (cloudbuild.yaml and
  # build-crac.sh both hardcode DB_PROFILE=postgres). The db/migration/*.sql scripts are
  # Postgres dialect only, so Flyway is left disabled here; this profile keeps its old
  # ddl-auto=update behavior (from application.yml) and is otherwise unmaintained/untested
  # by this change.
  flyway:
    enabled: false
